<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player</title>
    <style>
      .danger { border: 0; border-radius: 999px; background: rgba(229,9,20,.16); color: #ffb8b8; padding: 9px 12px; display: inline-flex; align-items: center; gap: 6px; font-weight: 800; }
      .danger:hover { background: rgba(229,9,20,.28); }
      .modal-backdrop { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 24px; background: rgba(0,0,0,.72); backdrop-filter: blur(10px); }
      .modal { width: min(520px, 100%); border-radius: 28px; padding: 28px; text-align: center; }
      .modal h2 { justify-content: center; font-size: 30px; }
      .modal p { margin-bottom: 22px; }
      .live-hls-transcoding-overlay {
        position: fixed;
        left: 50%;
        bottom: 96px;
        transform: translateX(-50%);
        z-index: 90;
        display: none;
        align-items: center;
        gap: 10px;
        padding: 12px 16px;
        border-radius: 999px;
        background: rgba(0,0,0,.78);
        color: white;
        font-weight: 900;
        box-shadow: 0 14px 40px rgba(0,0,0,.35);
        backdrop-filter: blur(10px);
      }
      .live-hls-transcoding-overlay.visible { display: inline-flex; }
      .live-hls-spinner {
        width: 18px;
        height: 18px;
        border: 3px solid rgba(255,255,255,.25);
        border-top-color: white;
        border-radius: 50%;
        animation: liveHlsSpin .8s linear infinite;
      }
      @keyframes liveHlsSpin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      (() => {
        const FALLBACK_KEY = 'player_audio_720_fallback_v4';
        let lastDecodedAudio = new WeakMap();
        let lastHandledKey = '';
        function getSeen() { try { return JSON.parse(sessionStorage.getItem(FALLBACK_KEY) || '{}'); } catch { return {}; } }
        function setSeen(key) { const seen = getSeen(); seen[key] = Date.now(); sessionStorage.setItem(FALLBACK_KEY, JSON.stringify(seen)); }
        function streamSelect() {
          return [...document.querySelectorAll('.player-page .compact-select select')].find((select) => {
            const text = [...select.options].map(o => o.textContent || '').join(' ');
            return select.options.length > 1 && (/720|1080|4k|auto|oryginał|oryginal|original|source|Torrentio|BluRay|WEB|Stream/i.test(text));
          });
        }
        function selectedOption(select) {
          return select ? ([...select.options].find((o) => o.selected) || select.options[Number(select.value)] || select.options[0]) : null;
        }
        function currentTitle() { return document.querySelector('.player-page h1')?.textContent?.trim() || 'unknown'; }
        function currentUrl() {
          const video = document.querySelector('.player-page video');
          return video?.currentSrc || video?.src || '';
        }
        function find720(select) {
          return [...(select?.options || [])].find((o) => /(^|[^0-9])720\s*p?([^0-9]|$)/i.test(o.textContent || ''));
        }
        function closePopup() { document.querySelector('.audio-fallback-modal')?.remove(); }
        function openExternal(url) { if (url) window.open(url, '_blank', 'noopener,noreferrer'); }
        function downloadUrl(url) {
          if (!url) return;
          const a = document.createElement('a');
          a.href = url;
          a.download = '';
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          document.body.appendChild(a);
          a.click();
          a.remove();
        }
        function showFallbackPopup(originalUrl, originalName, switched) {
          if (document.querySelector('.audio-fallback-modal')) return;
          const backdrop = document.createElement('div');
          backdrop.className = 'modal-backdrop audio-fallback-modal';
          backdrop.innerHTML = `
            <div class="modal glass">
              <h2>Możliwy problem z dźwiękiem</h2>
              <p>Przeglądarka nie dekoduje dźwięku z tego źródła. ${switched ? 'Z tego powodu automatycznie przełączono na transkodowaną wersję 720p.' : 'Nie znaleziono automatycznie wersji 720p do przełączenia.'}</p>
              <p>Jeśli chcesz oglądać w wyższej jakości, możesz pobrać oryginalne wideo albo otworzyć je w odtwarzaczu systemowym.</p>
              ${originalName ? `<p><small>Oryginalne źródło: ${originalName}</small></p>` : ''}
              <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
                <button class="danger audio-download" type="button">Pobierz</button>
                <button class="primary audio-system" type="button">Odtwarzaj w odtwarzaczu systemowym</button>
                <button class="audio-close" type="button">Zamknij</button>
              </div>
            </div>`;
          backdrop.querySelector('.audio-close').addEventListener('click', closePopup);
          backdrop.querySelector('.audio-download').addEventListener('click', () => downloadUrl(originalUrl));
          backdrop.querySelector('.audio-system').addEventListener('click', () => openExternal(originalUrl));
          document.body.appendChild(backdrop);
        }
        function switchTo720AndShow(reason) {
          const select = streamSelect();
          if (!select) return;
          const option = selectedOption(select);
          const originalName = option?.textContent || '';
          const originalUrl = currentUrl();
          const key = `${currentTitle()}|${select.value}|${originalName}|${reason}`;
          if (getSeen()[key] || key === lastHandledKey) return;
          lastHandledKey = key;
          setSeen(key);
          const candidate = find720(select);
          let switched = false;
          if (candidate && candidate.value !== select.value) {
            select.value = candidate.value;
            select.dispatchEvent(new Event('change', { bubbles: true }));
            switched = true;
          }
          showFallbackPopup(originalUrl, originalName, switched);
        }
        function checkSilentAudio() {
          const video = document.querySelector('.player-page video');
          if (!video || !video.currentSrc || video.paused || video.currentTime < 8) return;
          if (!('webkitAudioDecodedByteCount' in video)) return;
          const previous = lastDecodedAudio.get(video) ?? video.webkitAudioDecodedByteCount;
          const current = video.webkitAudioDecodedByteCount;
          lastDecodedAudio.set(video, current);
          if (current === 0 || (current === previous && video.currentTime > 12)) switchTo720AndShow('silent-audio');
        }
        setInterval(checkSilentAudio, 2500);
      })();
    </script>
    <script>
      (() => {
        let lastVideo = null;
        let lastSrc = '';
        let lastTime = 0;
        let lastMoveAt = Date.now();
        let startedSources = new Set();
        function overlay() {
          let node = document.querySelector('.live-hls-transcoding-overlay');
          if (!node) {
            node = document.createElement('div');
            node.className = 'live-hls-transcoding-overlay';
            node.innerHTML = '<span class="live-hls-spinner"></span><span>transkodowanie...</span>';
            document.body.appendChild(node);
          }
          return node;
        }
        function showOverlay(show) { overlay().classList.toggle('visible', Boolean(show)); }
        function isLiveHls(video) {
          if (!video) return false;
          const src = video.currentSrc || video.src || '';
          return /\.m3u8(\?|#|$)/i.test(src) || !Number.isFinite(video.duration) || Number.isNaN(video.duration);
        }
        function seekableStart(video) {
          try { return video.seekable.length ? video.seekable.start(0) : 0; } catch { return 0; }
        }
        function seekableEnd(video) {
          try { return video.seekable.length ? video.seekable.end(video.seekable.length - 1) : video.currentTime; } catch { return video.currentTime; }
        }
        function maybeStartAtBeginning(video) {
          if (!isLiveHls(video)) return;
          const src = video.currentSrc || video.src || '';
          if (!src || startedSources.has(src)) return;
          const start = seekableStart(video);
          const end = seekableEnd(video);
          if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return;
          startedSources.add(src);
          if (!Number.isFinite(video.currentTime) || video.currentTime > start + 5 || video.currentTime >= end - 1) {
            try { video.currentTime = start; } catch {}
          }
        }
        function tick() {
          const video = document.querySelector('.player-page video');
          if (!video) { showOverlay(false); return; }
          const src = video.currentSrc || video.src || '';
          if (video !== lastVideo || src !== lastSrc) {
            lastVideo = video;
            lastSrc = src;
            lastTime = video.currentTime || 0;
            lastMoveAt = Date.now();
            setTimeout(() => maybeStartAtBeginning(video), 300);
          }
          if (!isLiveHls(video)) { showOverlay(false); return; }
          if (Math.abs((video.currentTime || 0) - lastTime) > .2) {
            lastTime = video.currentTime || 0;
            lastMoveAt = Date.now();
            showOverlay(false);
          }
          const stuck = !video.paused && !video.ended && video.currentTime > 1 && Date.now() - lastMoveAt > 6500;
          const waitingForSegments = !video.paused && (video.readyState < 3 || stuck);
          showOverlay(waitingForSegments);
          if (stuck) {
            const end = seekableEnd(video);
            if (Number.isFinite(end) && end > video.currentTime + .6) {
              try { video.currentTime = Math.max(seekableStart(video), video.currentTime - .2); } catch {}
              video.play?.().catch?.(() => {});
            }
          }
        }
        setInterval(tick, 1000);
      })();
    </script>
  </body>
</html>
