<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Player</title>
    <style>
      .danger { border: 0; border-radius: 999px; background: rgba(229,9,20,.16); color: #ffb8b8; padding: 9px 12px; display: inline-flex; align-items: center; gap: 6px; font-weight: 800; }
      .danger:hover { background: rgba(229,9,20,.28); }
      .check-list { display: grid; gap: 8px; max-height: 260px; overflow: auto; padding: 8px; border: 1px solid rgba(255,255,255,.08); border-radius: 14px; background: rgba(255,255,255,.04); }
      .check-list label { display: flex; gap: 8px; align-items: center; color: #ddd; }
      .check-list input { width: auto; accent-color: #e50914; }
      .preview-group-title { padding: 8px 10px 2px; color: #e50914; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: .12em; }
      .result-scroll { grid-auto-columns: 178px; }
      .modal-backdrop { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 24px; background: rgba(0,0,0,.72); backdrop-filter: blur(10px); }
      .modal { width: min(520px, 100%); border-radius: 28px; padding: 28px; text-align: center; }
      .modal h2 { justify-content: center; font-size: 30px; }
      .modal p { margin-bottom: 22px; }
      .panel button:not(.primary):not(.danger):not(.link) { border: 0; border-radius: 999px; background: rgba(255,255,255,.08); color: white; padding: 10px 14px; margin: 6px 6px 0 0; font-weight: 800; }
      .panel button:not(.primary):not(.danger):not(.link):hover { background: rgba(255,255,255,.14); }
      .admin h3 { margin-top: 24px; }
      .guest-code-box { margin: 12px 0; padding: 14px; border-radius: 16px; background: #e50914; color: white; font-weight: 900; letter-spacing: .08em; display: inline-block; }
      .allowed-card { display: grid; grid-template-columns: 58px 1fr; gap: 10px; align-items: center; }
      .allowed-card img { width: 58px; height: 86px; object-fit: cover; border-radius: 8px; background: #222; }
      .guest-helper-panel { border-top: 1px solid rgba(255,255,255,.08); padding-top: 12px; margin-top: 14px; }
      .cache-refresh-panel input { max-width: 120px; margin-right: 8px; }
      .cache-refresh-panel small, .embedded-subtitles-panel small { color: #bbb; display: block; margin-top: 8px; line-height: 1.45; }
      .cache-refresh-panel .cache-refresh-status, .embedded-subtitles-panel .embedded-subtitles-status { color: #ddd; display: block; margin-top: 8px; line-height: 1.45; }
      @keyframes playerToastCountdown { from { transform: scaleX(1); } to { transform: scaleX(0); } }
      .toast.timed-player-notice { position: relative; overflow: hidden; padding-bottom: 14px; }
      .toast.timed-player-notice::after { content: ""; position: absolute; left: 0; right: 0; bottom: 0; height: 3px; background: linear-gradient(90deg, #fff, rgba(255,255,255,.35)); transform-origin: left center; animation: playerToastCountdown 3s linear forwards; }
      @media (max-width: 760px) { .modal { padding: 22px; } .check-list { max-height: 210px; } }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (() => {
        const originalFetch = window.fetch.bind(window);
        const embeddedState = { hasPolishAddon: false, subtitlesLoaded: false, firstSeen: {}, loading: new Set(), loaded: new Set() };

        function authHeaders(extra = {}) {
          const token = localStorage.getItem('player_token');
          return { ...(token ? { Authorization: `Bearer ${token}` } : {}), ...extra };
        }

        function subtitleFormatLabel(value) {
          const map = { srt: 'SRT', vtt: 'VTT', ass: 'ASS', ssa: 'SSA', sub: 'SUB', mpl2: 'MPL2', sami: 'SAMI', smi: 'SAMI', ttml: 'TTML', dfxp: 'DFXP', unknown: '?' };
          return map[String(value || '').toLowerCase()] || String(value || '?').toUpperCase();
        }

        function formatTimestamp(seconds) {
          const totalMs = Math.max(0, Math.round(Number(seconds || 0) * 1000));
          const ms = totalMs % 1000;
          const totalSeconds = Math.floor(totalMs / 1000);
          const s = totalSeconds % 60;
          const m = Math.floor(totalSeconds / 60) % 60;
          const h = Math.floor(totalSeconds / 3600);
          return `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}.${String(ms).padStart(3, '0')}`;
        }

        function cuesToVtt(cues) {
          const lines = ['WEBVTT', ''];
          (cues || []).forEach((cue, index) => {
            lines.push(String(index + 1));
            lines.push(`${formatTimestamp(cue.start)} --> ${formatTimestamp(cue.end)}`);
            lines.push(String(cue.text || ''));
            lines.push('');
          });
          return lines.join('\n');
        }

        function vttDataUrl(vtt) {
          return `data:text/vtt;charset=utf-8,${encodeURIComponent(vtt || 'WEBVTT\n\n')}`;
        }

        function subtitleStatusLabel(subtitle) {
          if (subtitle?.status === 'ready') return `${subtitle.cue_count || subtitle.cues?.length || 0} cue`;
          if (subtitle?.status === 'error') return 'błąd';
          return 'surowe';
        }

        function normalizeSubtitleForPlayer(subtitle, index) {
          if (!subtitle || typeof subtitle !== 'object') return subtitle;
          const next = { ...subtitle };
          const format = subtitleFormatLabel(next.format);
          const status = subtitleStatusLabel(next);
          const baseName = next.name || next.title || next.addon || `Napisy ${index + 1}`;
          next.name = `${baseName} [${format} • ${status}]`;
          next.title = next.name;

          if (next.vtt || Array.isArray(next.cues) || next.status === 'error') {
            const vtt = next.vtt || cuesToVtt(next.cues || []);
            delete next.original_url;
            next.url = vttDataUrl(vtt);
            next.file = '';
          }

          if (next.status === 'error' && next.error) {
            next.name = `${baseName} [${format} • błąd: ${String(next.error).slice(0, 80)}]`;
            next.title = next.name;
          }
          return next;
        }

        function isPolishText(value) {
          const text = String(value || '').toLowerCase();
          return /(^|\b)(pl|pol|polish|polski)(\b|$)/.test(text);
        }

        function subtitleLooksPolish(subtitle) {
          return isPolishText([subtitle?.lang, subtitle?.language, subtitle?.langCode, subtitle?.iso, subtitle?.id, subtitle?.name, subtitle?.title].join(' '));
        }

        function hasPolishNativeTrack(video) {
          try {
            return Array.from(video?.textTracks || []).some((track) => !String(track.label || '').startsWith('Addon •') && isPolishText(`${track.language || ''} ${track.label || ''}`));
          } catch { return false; }
        }

        function forceReactTrackRefresh(video) {
          setTimeout(() => {
            try { video.dispatchEvent(new Event('loadedmetadata', { bubbles: true })); } catch {}
            try { video.dispatchEvent(new Event('canplay', { bubbles: true })); } catch {}
          }, 80);
        }

        function addEmbeddedTrack(video, track, subtitle) {
          const key = `ffmpeg-${track.index}`;
          if (video.querySelector(`track[data-embedded-ffmpeg="${key}"]`)) return;
          const trackEl = document.createElement('track');
          const format = subtitleFormatLabel(subtitle.format || track.codec);
          const cueCount = subtitle.cue_count || subtitle.cues?.length || 0;
          const lang = track.language || subtitle.language || (track.polish ? 'pl' : 'und');
          const label = `Film FFmpeg • ${track.polish ? 'Polski' : (track.label || lang || 'Napisy')} • ${format} • ${cueCount} cue`;
          trackEl.kind = 'subtitles';
          trackEl.label = label;
          trackEl.srclang = lang;
          trackEl.src = vttDataUrl(subtitle.vtt || cuesToVtt(subtitle.cues || []));
          trackEl.dataset.embeddedFfmpeg = key;
          trackEl.addEventListener('load', () => forceReactTrackRefresh(video), { once: true });
          video.appendChild(trackEl);
          forceReactTrackRefresh(video);
        }

        async function loadEmbeddedForVideo(video) {
          const url = video?.currentSrc || video?.src;
          if (!url || url.startsWith('data:') || url.startsWith('blob:')) return;
          embeddedState.firstSeen[url] ||= Date.now();
          if (!embeddedState.subtitlesLoaded && Date.now() - embeddedState.firstSeen[url] < 2500) return;
          const nativePolish = hasPolishNativeTrack(video);
          const key = `${url}|addon:${embeddedState.hasPolishAddon}|native:${nativePolish}`;
          if (embeddedState.loading.has(key) || embeddedState.loaded.has(key)) return;
          embeddedState.loading.add(key);
          try {
            const params = new URLSearchParams({ url, has_polish_addon: String(embeddedState.hasPolishAddon), has_polish_native: String(nativePolish) });
            const scanResponse = await originalFetch(`/api/embedded-subtitles/scan?${params}`, { headers: authHeaders() });
            if (!scanResponse.ok) return;
            const scan = await scanResponse.json();
            if (scan.skipped || !Array.isArray(scan.tracks)) { embeddedState.loaded.add(key); return; }
            let candidates = scan.tracks.filter((track) => track.extractable);
            candidates.sort((a, b) => Number(!b.polish) - Number(!a.polish));
            if (scan.mode === 'auto') candidates = candidates.filter((track) => track.polish).slice(0, 2);
            else candidates = candidates.slice(0, 5);
            for (const track of candidates) {
              const extractParams = new URLSearchParams({ url, stream_index: String(track.index) });
              const extractResponse = await originalFetch(`/api/embedded-subtitles/extract?${extractParams}`, { headers: authHeaders() });
              if (!extractResponse.ok) continue;
              const subtitle = await extractResponse.json();
              if (subtitle?.status === 'ready') addEmbeddedTrack(video, track, subtitle);
            }
            embeddedState.loaded.add(key);
          } catch (err) {
            console.warn('Embedded subtitles scan failed:', err);
          } finally {
            embeddedState.loading.delete(key);
          }
        }

        function scheduleEmbeddedScan() {
          setTimeout(() => document.querySelectorAll('.player-shell video, video').forEach(loadEmbeddedForVideo), 350);
        }

        window.fetch = async (input, init = {}) => {
          const url = typeof input === 'string' ? input : input?.url;
          let nextInput = input;
          if (typeof url === 'string' && (url.startsWith('/api/catalogs') || url.startsWith('/api/playback/history'))) {
            const separator = url.includes('?') ? '&' : '?';
            nextInput = `${url}${separator}_=${Date.now()}`;
          }
          if (typeof url === 'string' && url.startsWith('/api/subtitles')) {
            embeddedState.subtitlesLoaded = false;
            embeddedState.hasPolishAddon = false;
          }

          const response = await originalFetch(nextInput, init);

          if (typeof url === 'string' && url.startsWith('/api/subtitles')) {
            embeddedState.subtitlesLoaded = true;
            if (response.ok) {
              const data = await response.clone().json().catch(() => null);
              if (data && Array.isArray(data.subtitles)) {
                const normalized = { ...data, subtitles: data.subtitles.map(normalizeSubtitleForPlayer) };
                embeddedState.hasPolishAddon = normalized.subtitles.some(subtitleLooksPolish);
                scheduleEmbeddedScan();
                return new Response(JSON.stringify(normalized), {
                  status: response.status,
                  statusText: response.statusText,
                  headers: { 'Content-Type': 'application/json' },
                });
              }
            }
            scheduleEmbeddedScan();
          }

          return response;
        };

        const videoObserver = new MutationObserver(scheduleEmbeddedScan);
        videoObserver.observe(document.documentElement, { childList: true, subtree: true, attributes: true, attributeFilter: ['src'] });
        setInterval(scheduleEmbeddedScan, 2500);
      })();
    </script>
    <script>
      (() => {
        const CACHE_KEY = 'player_home_cache_v1';
        const UI_KEY = 'player_ui_state_v1';
        const INTERVAL_KEY = 'player_library_refresh_interval_days_v1';
        const DEFAULT_DAYS = 7;
        const MIN_DAYS = 1;
        const MAX_DAYS = 30;
        const DAY_MS = 24 * 60 * 60 * 1000;

        function authHeaders(extra = {}) {
          const token = localStorage.getItem('player_token');
          return { ...(token ? { Authorization: `Bearer ${token}` } : {}), ...extra };
        }

        function clampDays(value) {
          const parsed = Math.round(Number(value));
          if (!Number.isFinite(parsed)) return DEFAULT_DAYS;
          return Math.min(MAX_DAYS, Math.max(MIN_DAYS, parsed));
        }

        function getIntervalDays() {
          return clampDays(localStorage.getItem(INTERVAL_KEY) || DEFAULT_DAYS);
        }

        function setIntervalDays(value) {
          const days = clampDays(value);
          localStorage.setItem(INTERVAL_KEY, String(days));
          return days;
        }

        function readCache() {
          try { return JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch { return {}; }
        }

        function clearLibraryCache() {
          localStorage.removeItem(CACHE_KEY);
        }

        function setStatus(panel, message, selector = '.cache-refresh-status') {
          const status = panel?.querySelector(selector);
          if (status) status.textContent = message;
        }

        function clearAndReload(event) {
          const button = event?.currentTarget;
          const panel = button?.closest('.cache-refresh-panel');
          clearLibraryCache();
          sessionStorage.setItem('player_library_manual_refresh', String(Date.now()));
          localStorage.setItem(UI_KEY, JSON.stringify({ screen: 'home', selected: null, playerData: null }));
          if (button) button.disabled = true;
          setStatus(panel, 'Czyszczę cache i wymuszam pobranie bibliotek z addonów...');
          const nextUrl = `${window.location.pathname || '/'}?refresh_libraries=${Date.now()}`;
          setTimeout(() => window.location.replace(nextUrl), 200);
        }

        function enforceAutomaticRefresh() {
          const cache = readCache();
          const updatedAt = Number(cache.updated_at || 0);
          if (!updatedAt) return;
          const intervalMs = getIntervalDays() * DAY_MS;
          if (Date.now() - updatedAt >= intervalMs) clearLibraryCache();
        }

        function lastRefreshLabel() {
          const updatedAt = Number(readCache().updated_at || 0);
          if (!updatedAt) return 'Brak zapisanego odświeżenia w tej przeglądarce.';
          return 'Ostatnie odświeżenie: ' + new Date(updatedAt).toLocaleString();
        }

        function injectCacheControls(grid) {
          if (!grid || grid.querySelector('.cache-refresh-panel')) return;
          const panel = document.createElement('div');
          panel.className = 'glass panel cache-refresh-panel';
          panel.innerHTML = `
            <h2>Odświeżenie bibliotek</h2>
            <p>Wymuś pobranie nowych bibliotek z addonów albo ustaw, jak długo strona może używać zapamiętanej listy.</p>
            <label>Automatyczne odświeżenie co</label>
            <div>
              <input class="library-refresh-days" type="number" min="1" max="30" step="1" value="${getIntervalDays()}" />
              <span>dni</span>
            </div>
            <button class="primary library-refresh-now" type="button">Odśwież biblioteki teraz</button>
            <button class="library-refresh-save" type="button">Zapisz interwał</button>
            <small>${lastRefreshLabel()}<br />Minimum: 24h. Maksimum: 30 dni. Domyślnie: 7 dni.</small>
            <span class="cache-refresh-status"></span>`;

          panel.querySelector('.library-refresh-now').addEventListener('click', clearAndReload);
          panel.querySelector('.library-refresh-save').addEventListener('click', (event) => {
            event.preventDefault();
            const input = panel.querySelector('.library-refresh-days');
            input.value = setIntervalDays(input.value);
            const small = panel.querySelector('small');
            if (small) small.innerHTML = `${lastRefreshLabel()}<br />Interwał zapisany: ${input.value} dni. Minimum: 24h. Maksimum: 30 dni.`;
            setStatus(panel, `Zapisano automatyczne odświeżenie co ${input.value} dni.`);
          });
          grid.appendChild(panel);
        }

        function injectEmbeddedSubtitleControls(grid) {
          if (!grid || grid.querySelector('.embedded-subtitles-panel')) return;
          const panel = document.createElement('div');
          panel.className = 'glass panel embedded-subtitles-panel';
          panel.innerHTML = `
            <h2>Napisy osadzone w filmie</h2>
            <p>Kontroluje użycie FFprobe/FFmpeg do wykrywania i wyciągania tekstowych napisów z pliku wideo.</p>
            <label>Tryb FFmpeg dla napisów embedded</label>
            <select class="embedded-subtitles-mode">
              <option value="off">Wyłącz</option>
              <option value="auto">Auto</option>
              <option value="on">Włącz</option>
            </select>
            <button class="primary embedded-subtitles-save" type="button">Zapisz tryb</button>
            <small>Auto: FFmpeg uruchamia się tylko, gdy nie ma polskich napisów z addonu ani polskich ścieżek wykrytych natywnie przez przeglądarkę. Włącz: skanuje tekstowe ścieżki embedded. Wyłącz: nie używa FFmpeg.</small>
            <span class="embedded-subtitles-status">Ładowanie ustawienia...</span>`;

          const select = panel.querySelector('.embedded-subtitles-mode');
          fetch('/api/embedded-subtitles/settings', { headers: authHeaders() })
            .then((r) => r.ok ? r.json() : Promise.reject(new Error('Nie udało się pobrać ustawienia')))
            .then((data) => { select.value = data.mode || 'auto'; setStatus(panel, `Aktualny tryb: ${select.value}`, '.embedded-subtitles-status'); })
            .catch((err) => setStatus(panel, err.message, '.embedded-subtitles-status'));

          panel.querySelector('.embedded-subtitles-save').addEventListener('click', async () => {
            try {
              const response = await fetch('/api/admin/embedded-subtitles/settings', { method: 'PUT', headers: authHeaders({ 'Content-Type': 'application/json' }), body: JSON.stringify({ mode: select.value }) });
              if (!response.ok) throw new Error(await response.text());
              const data = await response.json();
              setStatus(panel, `Zapisano tryb: ${data.mode}`, '.embedded-subtitles-status');
            } catch (err) {
              setStatus(panel, `Błąd zapisu: ${err.message}`, '.embedded-subtitles-status');
            }
          });
          grid.appendChild(panel);
        }

        function injectAdminControls() {
          const grid = document.querySelector('main.admin .admin-grid');
          if (!grid) return;
          injectCacheControls(grid);
          injectEmbeddedSubtitleControls(grid);
        }

        enforceAutomaticRefresh();
        if (!localStorage.getItem(INTERVAL_KEY)) setIntervalDays(DEFAULT_DAYS);
        const observer = new MutationObserver(injectAdminControls);
        observer.observe(document.documentElement, { childList: true, subtree: true });
        document.addEventListener('DOMContentLoaded', injectAdminControls);
      })();
    </script>
    <script>
      (() => {
        const TIMED_NOTICE_TEXTS = [
          'Kliknij play, jeśli przeglądarka zablokowała autoodtwarzanie.',
          'Film długo się buforuje. Nie znaleziono automatycznej opcji 720p dla tego źródła.',
        ];

        function isTimedPlayerNotice(node) {
          const text = node?.textContent || '';
          return TIMED_NOTICE_TEXTS.some((notice) => text.includes(notice));
        }

        function decorateTimedPlayerNotices() {
          document.querySelectorAll('.toast').forEach((toast) => {
            if (!isTimedPlayerNotice(toast)) return;
            if (toast.dataset.timedPlayerNotice === 'done') {
              toast.remove();
              return;
            }
            if (toast.dataset.timedPlayerNotice === 'running') return;
            toast.dataset.timedPlayerNotice = 'running';
            toast.classList.add('timed-player-notice');
            setTimeout(() => {
              toast.dataset.timedPlayerNotice = 'done';
              toast.style.display = 'none';
              toast.remove();
            }, 3000);
          });
        }

        const noticeObserver = new MutationObserver(decorateTimedPlayerNotices);
        noticeObserver.observe(document.documentElement, { childList: true, subtree: true, characterData: true });
        document.addEventListener('DOMContentLoaded', decorateTimedPlayerNotices);
        setInterval(decorateTimedPlayerNotices, 500);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
